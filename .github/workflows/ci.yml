name: CI
on:
  push:
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - run: ruff check src tests tools
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/
  action-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Passing deck uploads reports
        uses: ./
        with:
          path: examples/good-deck.pptx
          renderer: wireframe
          artifact-name: good-deck-report
      - name: Failing deck still uploads reports
        id: bad
        continue-on-error: true
        uses: ./
        with:
          path: examples/bad-deck.pptx
          profile: ai-generated
          renderer: wireframe
          artifact-name: bad-deck-report
      - name: Confirm the bad deck failed its gate
        if: always()
        env:
          BAD_OUTCOME: ${{ steps.bad.outcome }}
        run: test "$BAD_OUTCOME" = failure
