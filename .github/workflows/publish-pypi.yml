name: Publish to PyPI
on:
  workflow_dispatch:
    inputs:
      confirm-version:
        description: Version to publish, for example 1.3.1.
        required: true
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - name: Confirm package version
        env:
          EXPECTED: ${{ inputs.confirm-version }}
        run: python -c 'import tomllib, os; actual=tomllib.load(open("pyproject.toml","rb"))["project"]["version"]; assert actual == os.environ["EXPECTED"], (actual, os.environ["EXPECTED"])'
      - run: python -m build
      - name: Smoke built wheel
        shell: bash
        run: |
          python -m venv "$RUNNER_TEMP/pptlint-smoke"
          "$RUNNER_TEMP/pptlint-smoke/bin/pip" install dist/*.whl
          "$RUNNER_TEMP/pptlint-smoke/bin/pptlint" --version | grep "PPTLint ${{ inputs.confirm-version }}"
          "$RUNNER_TEMP/pptlint-smoke/bin/pptlint" plan --help
          "$RUNNER_TEMP/pptlint-smoke/bin/pptlint" fix --help
          "$RUNNER_TEMP/pptlint-smoke/bin/pptlint" app --help
          "$RUNNER_TEMP/pptlint-smoke/bin/pptlint" policy init --help
          "$RUNNER_TEMP/pptlint-smoke/bin/decklint" --version 2>"$RUNNER_TEMP/decklint-warning.txt"
          ! grep -q "v0.4" "$RUNNER_TEMP/decklint-warning.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-distributions
          path: dist/
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pypi-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: pypi-distributions
          path: dist/
      - name: Verify published package
        env:
          VERSION: ${{ inputs.confirm-version }}
        shell: bash
        run: |
          for attempt in {1..24}; do
            if python -m pip index versions pptlint 2>/dev/null | grep -q "$VERSION"; then break; fi
            sleep 5
          done
          python -m venv "$RUNNER_TEMP/pptlint-published"
          "$RUNNER_TEMP/pptlint-published/bin/pip" install --no-cache-dir "pptlint==$VERSION"
          "$RUNNER_TEMP/pptlint-published/bin/pptlint" --version | grep "PPTLint $VERSION"
          "$RUNNER_TEMP/pptlint-published/bin/pptlint" check examples/good-deck.pptx --renderer wireframe --output "$RUNNER_TEMP/published-report"
      - name: Create release and update major Action tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.confirm-version }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tag="v$VERSION"
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag -a "$tag" -m "PPTLint $tag"
            git push origin "$tag"
          fi
          python tools/build_release_notes.py --version "$VERSION" --output "$RUNNER_TEMP/release-notes.md"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" dist/* --title "PPTLint $tag" --notes-file "$RUNNER_TEMP/release-notes.md"
          fi
          major="v${VERSION%%.*}"
          git tag -f -a "$major" -m "PPTLint $major" "$tag"
          git push origin "refs/tags/$major" --force
