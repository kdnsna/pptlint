name: False positive
description: Report a high-confidence finding that should not have affected the score or CI gate.
title: "[False positive]: "
labels: [false-positive]
body:
  - type: input
    id: version
    attributes:
      label: DeckLint version
    validations:
      required: true
  - type: input
    id: rule
    attributes:
      label: Rule ID
      placeholder: readability.small-font
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Why the finding is incorrect
      description: Share a synthetic or public reproduction. Do not upload a private deck.
    validations:
      required: true
  - type: textarea
    id: report
    attributes:
      label: Redacted finding JSON
      render: json
    validations:
      required: true

