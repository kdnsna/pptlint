name: Bug report
description: Report a crash, invalid report, or renderer failure.
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: DeckLint version
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and exit code
      render: shell
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Safe reproduction
      description: Use a synthetic or public file. Never attach confidential material.
    validations:
      required: true

