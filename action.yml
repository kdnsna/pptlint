name: DeckLint audit
description: Audit PPTX files and upload offline HTML and JSON quality reports.
author: Kdnsna
branding:
  icon: check-circle
  color: orange
inputs:
  path:
    description: PPTX file to audit.
    required: true
  profile:
    description: baseline or ai-generated.
    default: baseline
  fail-on:
    description: none, low, medium, high, or critical.
    default: high
  min-score:
    description: Optional minimum overall score from 0 to 100.
    default: ""
  renderer:
    description: auto, wireframe, or libreoffice.
    default: wireframe
  artifact-name:
    description: Uploaded report artifact name.
    default: decklint-report
outputs:
  score:
    description: Overall DeckLint score.
    value: ${{ steps.audit.outputs.score }}
  html-report:
    description: Path to the generated HTML report.
    value: ${{ steps.audit.outputs.html-report }}
  json-report:
    description: Path to the generated JSON report.
    value: ${{ steps.audit.outputs.json-report }}
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install DeckLint from this action ref
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"
    - name: Audit PowerPoint
      id: audit
      continue-on-error: true
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_MIN_SCORE: ${{ inputs.min-score }}
        INPUT_RENDERER: ${{ inputs.renderer }}
      run: |
        args=(decklint audit "$INPUT_PATH" --profile "$INPUT_PROFILE" --fail-on "$INPUT_FAIL_ON" --renderer "$INPUT_RENDERER" --output decklint-report)
        if [[ -n "$INPUT_MIN_SCORE" ]]; then args+=(--min-score "$INPUT_MIN_SCORE"); fi
        set +e
        "${args[@]}"
        status=$?
        set -e
        score=$(python -c 'import json; print(json.load(open("decklint-report.json"))["scores"]["overall"])' 2>/dev/null || printf '0')
        printf 'score=%s\n' "$score" >> "$GITHUB_OUTPUT"
        printf 'html-report=%s\n' "$GITHUB_WORKSPACE/decklint-report.html" >> "$GITHUB_OUTPUT"
        printf 'json-report=%s\n' "$GITHUB_WORKSPACE/decklint-report.json" >> "$GITHUB_OUTPUT"
        printf 'exit-code=%s\n' "$status" >> "$GITHUB_OUTPUT"
    - name: Upload DeckLint reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          decklint-report.html
          decklint-report.json
        if-no-files-found: error
    - name: Enforce quality gate
      if: always()
      shell: bash
      run: exit "${{ steps.audit.outputs.exit-code }}"
